<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: #eaeaea;
    padding: 20px;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
}

/* Card */
.card {
    background: #151821;
    border: 1px solid #2a2f3a;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-4px);
    border-color: #3a4252;
}

/* Image */
.card img {
    width: 100%;
    border-radius: 6px;
}

/* Title */
.card p {
    margin: 10px 0 5px;
    color: #ccc;
}
</style>
</head>

<body>

<div class="grid">

<img src="./resources/bruh.png">
